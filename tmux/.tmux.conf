set -g mouse on
set -g history-limit 100000
set -g set-clipboard on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# vi-style copy mode
setw -g mode-keys vi

# Better split bindings
unbind '"'
unbind %
bind | split-window -h
bind - split-window -v

# Fast config reload
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"
